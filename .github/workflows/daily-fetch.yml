name: Daily News Fetch

on:
  # 每天北京时间 08:30 自动运行（UTC 00:30）
  schedule:
    - cron: '30 0 * * *'
  # 允许手动触发（方便测试）
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许推送数据文件到仓库

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetch script
        env:
          # 如果你有 OpenAI Key，在仓库 Settings → Secrets 里添加 OPENAI_API_KEY
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd daily-news
          python fetch_news.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-news/data/
          # 只有有新文件时才提交
          git diff --cached --quiet || git commit -m "chore: update daily news $(date -u +%Y-%m-%d)"
          git push
