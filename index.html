<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>JaJa Daily</title>

  <!-- Open Graph：分享链接时显示漂亮卡片 -->
  <meta property="og:title" content="JaJa Daily" />
  <meta property="og:description" content="每天精选餐饮零售 & AI 科技资讯，10 条，每早自动更新。" />
  <meta property="og:image" content="https://jackywu1999.github.io/jaja-daily/avatar.png" />
  <meta property="og:url" content="https://jackywu1999.github.io/jaja-daily/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="JaJa Daily" />

  <!-- Twitter Card（微信/飞书/大象之外，Twitter/X 分享也能显示卡片） -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="JaJa Daily" />
  <meta name="twitter:description" content="每天精选餐饮零售 & AI 科技资讯，10 条，每早自动更新。" />
  <meta name="twitter:image" content="https://jackywu1999.github.io/jaja-daily/avatar.png" />
  <style>
    :root {
      /* ── Notion 风格配色 ── */
      --bg:           #F4F0E9;       /* 主背景：暖米色 */
      --bg-hover:     #ede8df;       /* hover 背景 */
      --bg-card:      #faf7f2;       /* 卡片/引用背景 */
      --border:       #ddd8ce;       /* 主分割线 */
      --border-light: #e8e3d8;       /* 次分割线 */

      /* ── 文字层级（Notion 三层灰） ── */
      --text:         #37352f;       /* 主文字：Notion 标准深棕黑 */
      --text-sub:     #786B5C;       /* 次要文字：暖棕 */
      --text-muted:   #9b9a97;       /* 辅助信息：浅灰 */

      /* ── 强调色 ── */
      --accent:       #e03e3e;       /* 红色：阅读原文、竖线 */
      --accent-gold:  #c17d3c;       /* 暖金：标签、引号装饰 */
      --tag-bg:       rgba(193, 125, 60, 0.08);

      /* ── 字体栈 ── */
      --font-serif:   "Georgia", "Songti SC", "STSong", "SimSun", serif;
      --font-sans:    -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      max-width: 680px;
      margin: 0 auto;
      padding: 0 0 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 顶部 Header ── */
    .masthead {
      padding: 40px 24px 22px;
      border-bottom: 2px solid var(--text);
    }

    .masthead-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px 12px;
    }

    .masthead-title {
      font-size: 38px;
      font-style: italic;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
      font-family: var(--font-serif);
      white-space: nowrap;   /* 标题永远不换行 */
    }

    .masthead-date {
      font-size: 12px;
      color: var(--text);
      font-family: var(--font-serif);
      letter-spacing: 0.3px;
      white-space: nowrap;   /* 日期也不在自身内部换行 */
      margin-left: auto;     /* 尽量靠右，空间不够时换到下一行 */
    }

    /* ── 编辑寄语 ── */
    .editor-note {
      margin: 20px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-gold);
      border-radius: 6px;
      padding: 16px 20px 16px 20px;
    }

    .editor-note-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .editor-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
    }

    .editor-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-serif);
      letter-spacing: 0.5px;
    }

    .editor-note-text {
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
      font-family: var(--font-serif);
    }

    /* ── 板块标题 ── */
    .board-section {
      margin-top: 36px;
    }

    .board-header {
      padding: 0 24px 14px;
      border-bottom: 1px solid var(--border);
    }

    .board-title {
      display: flex;
      align-items: center;
    }

    .board-title-bar {
      width: 3px;
      height: 28px;
      background: var(--accent);
      border-radius: 2px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .board-title-zh {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-serif);
      letter-spacing: 1.5px;
    }

    .board-title-en {
      margin-top: 4px;
      font-size: 10px;
      letter-spacing: 3.5px;
      color: var(--text-muted);
      font-family: var(--font-serif);
      text-transform: uppercase;
      font-style: italic;
    }

    /* ── 资讯条目 ── */
    .news-item {
      padding: 16px 24px 14px;
      border-bottom: 1px solid var(--border-light);
      text-decoration: none;
      display: block;
      transition: background 0.12s;
    }

    .news-item:hover {
      background: var(--bg-hover);
    }

    .news-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      justify-content: space-between;
    }

    .news-meta-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .news-source {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-sans);
    }

    .news-meta-dot {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .news-date {
      display: none;
    }

    .news-tag {
      font-size: 10px;
      color: var(--accent-gold);
      background: var(--tag-bg);
      border-radius: 3px;
      padding: 1px 6px;
      font-family: var(--font-sans);
      font-weight: 500;
    }

    .news-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 6px;
      font-family: var(--font-serif);
    }

    .news-summary {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.7;
      margin-bottom: 10px;
      font-family: var(--font-serif);
      /* 最多显三行，超出省略号 */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-read-more {
      font-size: 12px;
      color: var(--accent);
      font-family: var(--font-sans);
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-weight: 500;
    }

    /* ── 状态页 ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: var(--font-sans);
    }
    .state-box .icon { font-size: 36px; margin-bottom: 12px; }
    .state-box .msg  { font-size: 15px; color: var(--text-sub); margin-bottom: 6px; }
    .state-box .sub  { font-size: 13px; color: var(--text-muted); }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 36px 20px 0;
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-sans);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <!-- 报头 -->
  <div class="masthead">
    <div class="masthead-top">
      <div class="masthead-title">JaJa Daily</div>
      <span class="masthead-date" id="mastDate"></span>
    </div>
  </div>

  <!-- 编辑寄语 -->
  <div class="editor-note" id="editorNote" style="display:none">
    <div class="editor-note-header">
      <img class="editor-avatar" src="./avatar.png" alt="小ja" />
      <div class="editor-name">小 ja 碎碎念</div>
    </div>
    <div class="editor-note-text" id="editorText"></div>
  </div>

  <!-- 资讯列表 -->
  <div id="newsList">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="msg">正在加载今日简报...</div>
    </div>
  </div>

  <div class="footer" id="footer" style="display:none">
    每日自动更新
  </div>

  <script>
    const DATA_BASE = './data';
    let allItems = [];

    const FNB_TAGS = ['餐饮动态','零售动态','商业洞察','电商'];
    const AI_TAGS  = ['大模型','AI产品','AI Agent','AIGC','AI算力','AI投融资','政策监管','开源','机器人'];

    function getTodayCST() {
      const d = new Date();
      const cst = new Date(d.getTime() + (8 * 60 - d.getTimezoneOffset()) * 60000);
      return cst.toISOString().slice(0, 10);
    }

    function getOffsetDate(offset) {
      const d = new Date();
      const cst = new Date(d.getTime() + (8 * 60 - d.getTimezoneOffset()) * 60000);
      cst.setUTCDate(cst.getUTCDate() + offset);
      return cst.toISOString().slice(0, 10);
    }

    async function loadNews() {
      showLoading();
      const dateStr = getTodayCST();
      try {
        const res = await fetch(`${DATA_BASE}/${dateStr}.json?t=${Date.now()}`);
        if (!res.ok) {
          const res2 = await fetch(`${DATA_BASE}/${getOffsetDate(-1)}.json?t=${Date.now()}`);
          if (!res2.ok) { showEmpty('今日数据尚未生成，请稍后再访问'); return; }
          renderData(await res2.json(), true);
          return;
        }
        renderData(await res.json(), false);
      } catch (e) {
        showError(e.message);
      }
    }

    function renderData(data, isYesterday) {
      if (!data.items || data.items.length === 0) { showEmpty('暂无资讯数据'); return; }
      allItems = data.items;
      document.getElementById('mastDate').textContent =
        formatDate(data.date) + (isYesterday ? '（昨日）' : '');
      buildEditorNote(allItems, data.editor_note || '');
      renderList(allItems);
      document.getElementById('footer').style.display = '';
    }

    function buildEditorNote(items, editorNote) {
      const note = document.getElementById('editorNote');
      const text = document.getElementById('editorText');
      // 优先用后端生成的 editor_note，没有则降级拼接
      if (editorNote) {
        text.textContent = editorNote;
      } else {
        const aiItems  = items.filter(i => AI_TAGS.includes(i.tag));
        const fnbItems = items.filter(i => FNB_TAGS.includes(i.tag));
        let sentence = `今天共精选 ${items.length} 条。`;
        if (fnbItems.length > 0) sentence += `餐饮零售板块：${fnbItems.slice(0,2).map(i=>i.title.slice(0,14)).join('、')}等话题在发酵；`;
        if (aiItems.length > 0)  sentence += `AI 科技板块：${aiItems.slice(0,2).map(i=>i.title.slice(0,14)).join('、')}等值得关注。`;
        text.textContent = sentence;
      }
      note.style.display = '';
    }

    function renderList(items) {
      const list = document.getElementById('newsList');
      if (items.length === 0) {
        list.innerHTML = `<div class="state-box"><div class="icon">🔍</div><div class="msg">今日暂无资讯</div></div>`;
        return;
      }
      const fnbItems   = items.filter(i => FNB_TAGS.includes(i.tag));
      const aiItems    = items.filter(i => AI_TAGS.includes(i.tag));
      const otherItems = items.filter(i => !FNB_TAGS.includes(i.tag) && !AI_TAGS.includes(i.tag));
      let html = '';

      if (fnbItems.length > 0) {
        html += `<div class="board-section">
          <div class="board-header">
            <div class="board-title">
              <div class="board-title-bar"></div>
              <div>
                <div class="board-title-zh">餐饮 &amp; 零售</div>
                <div class="board-title-en">FOOD · RETAIL</div>
              </div>
            </div>
          </div>
          ${fnbItems.map(renderItem).join('')}
        </div>`;
      }

      const aiAll = [...aiItems, ...otherItems];
      if (aiAll.length > 0) {
        html += `<div class="board-section">
          <div class="board-header">
            <div class="board-title">
              <div class="board-title-bar"></div>
              <div>
                <div class="board-title-zh">AI &amp; 科技</div>
                <div class="board-title-en">AI · TECH</div>
              </div>
            </div>
          </div>
          ${aiAll.map(renderItem).join('')}
        </div>`;
      }

      list.innerHTML = html;
    }

    function cleanSummary(summary, title) {
      if (!summary || summary === title) return '';
      let s = summary.trim();
      // 去掉开头重复标题的部分
      if (s.startsWith(title.slice(0, 10))) {
        s = s.slice(title.length).replace(/^[\s,，。::：]+/, '').trim();
      }
      // 去掉常见的无用前缀
      s = s.replace(/^(IT之家\d+月\d+日消息[，,]?|[据根]据[^，。]{2,10}[报道称]+[，,]?)/u, '').trim();
      // 去掉末尾的「查看全文」类尾巴
      s = s.replace(/[查看阅读]全文[\s…]*$/, '').trim();
      // 如果清理后内容太短（少于8字）就不展示
      if (s.length < 8) return '';
      return s;
    }

    function renderItem(item) {
      const summary = cleanSummary(item.summary, item.title);
      const tag = item.tag || '';
      return `
        <a class="news-item" href="${escHtml(item.url)}" target="_blank" rel="noopener">
          <div class="news-title">${escHtml(item.title)}</div>
          ${summary ? `<div class="news-summary">${escHtml(summary)}</div>` : ''}
          <div class="news-meta">
            <span class="news-read-more">阅读原文 →</span>
            <div class="news-meta-right">
              <span class="news-source">${escHtml(item.source || '')}</span>
              ${tag ? `<span class="news-meta-dot"></span><span class="news-tag">${escHtml(tag)}</span>` : ''}
            </div>
          </div>
        </a>`;
    }

    function showLoading() {
      document.getElementById('newsList').innerHTML = `
        <div class="state-box"><div class="spinner"></div><div class="msg">正在加载今日简报...</div></div>`;
    }
    function showEmpty(hint) {
      document.getElementById('newsList').innerHTML = `
        <div class="state-box"><div class="icon">📭</div><div class="msg">${hint || '今日暂无资讯'}</div><div class="sub">数据每日自动更新，请稍后再访问</div></div>`;
    }
    function showError(msg) {
      document.getElementById('newsList').innerHTML = `
        <div class="state-box"><div class="icon">⚠️</div><div class="msg">加载失败</div><div class="sub">${escHtml(msg)}</div></div>`;
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00+08:00');
      const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日　${days[d.getDay()]}`;
    }

    loadNews();
  </script>
</body>
</html>
