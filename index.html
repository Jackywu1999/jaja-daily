<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>JaJa Daily</title>
  <style>
    :root {
      --bg: #f5f0e8;
      --bg2: #ede8de;
      --card: #faf7f2;
      --border: #ddd5c4;
      --border-light: #e8e0d0;
      --accent: #c0392b;
      --accent2: #8b6914;
      --text: #2c2416;
      --text-sub: #6b5c3e;
      --text-muted: #9b8c72;
      --tag-color: #8b6914;
      --quote-bg: #fdf6e8;
      --quote-border: #d4a843;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", "STSong", "SimSun", "PingFang SC", serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 0 60px;
    }

    /* ── 顶部 Header ── */
    .masthead {
      padding: 36px 24px 20px;
      border-bottom: 2px solid var(--text);
    }

    .masthead-top {
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }

    .masthead-title {
      font-size: 36px;
      font-style: italic;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }

    .masthead-date {
      font-size: 14px;
      color: var(--text-sub);
      font-family: -apple-system, "PingFang SC", sans-serif;
      font-style: normal;
    }

    .masthead-sub {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-muted);
      font-family: -apple-system, "PingFang SC", sans-serif;
      font-style: normal;
      text-transform: uppercase;
    }

    /* ── 编辑寄语 ── */
    .editor-note {
      margin: 20px 24px;
      background: var(--quote-bg);
      border: 1px solid var(--quote-border);
      border-radius: 8px;
      padding: 18px 20px 18px 24px;
      position: relative;
    }

    .editor-note::before {
      content: '\201C';
      position: absolute;
      top: -4px;
      left: 12px;
      font-size: 52px;
      color: var(--quote-border);
      font-family: Georgia, serif;
      line-height: 1;
    }

    .editor-note::after {
      content: '\201D';
      position: absolute;
      bottom: -16px;
      right: 14px;
      font-size: 52px;
      color: var(--quote-border);
      font-family: Georgia, serif;
      line-height: 1;
    }

    .editor-note-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .editor-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      font-family: -apple-system, "PingFang SC", sans-serif;
    }

    .editor-note-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-sub);
      font-family: -apple-system, "PingFang SC", sans-serif;
      font-style: normal;
    }

    /* ── 板块标题 ── */
    .board-section {
      margin-top: 32px;
    }

    .board-header {
      padding: 0 24px 14px;
      border-bottom: 1px solid var(--border);
    }

    .board-title {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .board-title-bar {
      width: 4px;
      height: 32px;
      background: var(--accent);
      border-radius: 2px;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .board-title-zh {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      font-family: -apple-system, "PingFang SC", sans-serif;
      letter-spacing: 0.5px;
    }

    .board-title-en {
      margin-top: 3px;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-muted);
      font-family: -apple-system, sans-serif;
      text-transform: uppercase;
      padding-left: 16px;
    }

    /* ── 资讯条目 ── */
    .news-item {
      padding: 18px 24px 16px;
      border-bottom: 1px solid var(--border-light);
      text-decoration: none;
      display: block;
      transition: background 0.15s;
    }

    .news-item:hover {
      background: var(--bg2);
    }

    .news-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .news-source {
      font-size: 11px;
      color: var(--text-muted);
      font-family: -apple-system, "PingFang SC", sans-serif;
    }

    .news-meta-dot {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .news-date {
      font-size: 11px;
      color: var(--text-muted);
      font-family: -apple-system, "PingFang SC", sans-serif;
    }

    .news-tag {
      font-size: 10px;
      color: var(--tag-color);
      background: rgba(139, 105, 20, 0.1);
      border-radius: 3px;
      padding: 1px 6px;
      font-family: -apple-system, "PingFang SC", sans-serif;
      margin-left: auto;
    }

    .news-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 7px;
      font-family: -apple-system, "PingFang SC", sans-serif;
    }

    .news-summary {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.7;
      margin-bottom: 10px;
      font-family: -apple-system, "PingFang SC", sans-serif;
    }

    .news-read-more {
      font-size: 12px;
      color: var(--accent);
      font-family: -apple-system, "PingFang SC", sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    /* ── 状态页 ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: -apple-system, "PingFang SC", sans-serif;
    }
    .state-box .icon { font-size: 40px; margin-bottom: 12px; }
    .state-box .msg { font-size: 15px; color: var(--text-sub); margin-bottom: 6px; }
    .state-box .sub { font-size: 13px; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 32px 20px 0;
      font-size: 11px;
      color: var(--text-muted);
      font-family: -apple-system, "PingFang SC", sans-serif;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- 报头 -->
  <div class="masthead">
    <div class="masthead-top">
      <div class="masthead-title">JaJa Daily</div>
      <div class="masthead-date" id="mastDate">加载中...</div>
    </div>
    <div class="masthead-sub">餐饮 & 零售 · AI & 科技 · 每日精选 10 条</div>
  </div>

  <!-- 编辑寄语 -->
  <div class="editor-note" id="editorNote" style="display:none">
    <div class="editor-note-header">
      <div class="editor-name">小 ja 碎碎念</div>
    </div>
    <div class="editor-note-text" id="editorText"></div>
  </div>

  <!-- 资讯列表 -->
  <div id="newsList">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="msg">正在加载今日简报...</div>
    </div>
  </div>

  <div class="footer" id="footer" style="display:none">
    数据来源：IT之家 · 少数派 · 机器之心 · 36氪 · 钛媒体 &nbsp;·&nbsp; 每日自动更新
  </div>

  <script>
    // ── 数据源配置 ────────────────────────────────────────────────────────────
    // GitHub Pages 部署后，JSON 文件与 index.html 在同一仓库，通过相对路径访问
    // 本地开发时也可以直接用 file:// 打开（会走 fallback 逻辑）
    const DATA_BASE = './data';

    let allItems = [];

    // 两大板块 tag 归属
    const FNB_TAGS = ['餐饮动态','零售动态','商业洞察','电商'];
    const AI_TAGS  = ['大模型','AI产品','AI Agent','AIGC','AI算力','AI投融资','政策监管','开源','机器人'];

    // ── 日期工具 ──────────────────────────────────────────────────────────────
    function getTodayCST() {
      const d = new Date();
      // 转为北京时间
      const cst = new Date(d.getTime() + (8 * 60 - d.getTimezoneOffset()) * 60000);
      return cst.toISOString().slice(0, 10);
    }

    // ── 加载数据 ──────────────────────────────────────────────────────────────
    async function loadNews() {
      showLoading();
      const dateStr = getTodayCST();

      try {
        // 直接请求静态 JSON 文件，加时间戳防缓存
        const url = `${DATA_BASE}/${dateStr}.json?t=${Date.now()}`;
        const res = await fetch(url);

        if (!res.ok) {
          // 今日数据还没生成，尝试加载昨天的
          const yesterday = getOffsetDate(-1);
          const res2 = await fetch(`${DATA_BASE}/${yesterday}.json?t=${Date.now()}`);
          if (!res2.ok) {
            showEmpty('今日数据尚未生成，请稍后再访问');
            return;
          }
          const data2 = await res2.json();
          renderData(data2, true);
          return;
        }

        const data = await res.json();
        renderData(data, false);

      } catch (e) {
        showError(e.message);
      }
    }

    function getOffsetDate(offset) {
      const d = new Date();
      const cst = new Date(d.getTime() + (8 * 60 - d.getTimezoneOffset()) * 60000);
      cst.setUTCDate(cst.getUTCDate() + offset);
      return cst.toISOString().slice(0, 10);
    }

    function renderData(data, isYesterday) {
      if (!data.items || data.items.length === 0) {
        showEmpty('暂无资讯数据');
        return;
      }
      allItems = data.items;
      document.getElementById('mastDate').textContent =
        formatDate(data.date) + (isYesterday ? '（昨日）' : '');
      buildEditorNote(allItems);
      renderList(allItems);
      document.getElementById('footer').style.display = '';
    }

    // ── 编辑寄语 ──────────────────────────────────────────────────────────────
    function buildEditorNote(items) {
      const note = document.getElementById('editorNote');
      const text = document.getElementById('editorText');
      const aiItems  = items.filter(i => AI_TAGS.includes(i.tag));
      const fnbItems = items.filter(i => FNB_TAGS.includes(i.tag));
      let sentence = `今天共精选 ${items.length} 条。`;
      if (fnbItems.length > 0) sentence += `餐饮零售板块：${fnbItems.slice(0,2).map(i=>extractKeyword(i.title)).join('、')}等话题在发酵；`;
      if (aiItems.length > 0)  sentence += `AI 科技板块：${aiItems.slice(0,2).map(i=>extractKeyword(i.title)).join('、')}等值得关注。`;
      text.textContent = sentence;
      note.style.display = '';
    }

    function extractKeyword(title) {
      return title.replace(/[，。！？「」【】《》]/g, '').slice(0, 14);
    }

    // ── 渲染列表（两大板块） ──────────────────────────────────────────────────
    function renderList(items) {
      const list = document.getElementById('newsList');

      if (items.length === 0) {
        list.innerHTML = `<div class="state-box">
          <div class="icon">🔍</div>
          <div class="msg">今日暂无资讯</div>
        </div>`;
        return;
      }

      const fnbItems = items.filter(i => FNB_TAGS.includes(i.tag));
      const aiItems  = items.filter(i => AI_TAGS.includes(i.tag));
      const otherItems = items.filter(i => !FNB_TAGS.includes(i.tag) && !AI_TAGS.includes(i.tag));

      let html = '';

      if (fnbItems.length > 0) {
        html += `
          <div class="board-section">
            <div class="board-header">
              <div class="board-title">
                <div class="board-title-bar"></div>
                <div>
                  <div class="board-title-zh">餐饮 &amp; 零售</div>
                  <div class="board-title-en">FOOD · RETAIL</div>
                </div>
              </div>
            </div>
            ${fnbItems.map(item => renderItem(item)).join('')}
          </div>`;
      }

      const aiAll = [...aiItems, ...otherItems];
      if (aiAll.length > 0) {
        html += `
          <div class="board-section">
            <div class="board-header">
              <div class="board-title">
                <div class="board-title-bar"></div>
                <div>
                  <div class="board-title-zh">AI &amp; 科技</div>
                  <div class="board-title-en">AI · TECH</div>
                </div>
              </div>
            </div>
            ${aiAll.map(item => renderItem(item)).join('')}
          </div>`;
      }

      list.innerHTML = html;
    }

    function renderItem(item) {
      const hasSummary = item.summary && item.summary !== item.title;
      const tag = item.tag || '';
      return `
        <a class="news-item" href="${escHtml(item.url)}" target="_blank" rel="noopener">
          <div class="news-meta">
            <span class="news-source">${escHtml(item.source || '')}</span>
            <span class="news-meta-dot"></span>
            <span class="news-date">今日</span>
            ${tag ? `<span class="news-tag">${escHtml(tag)}</span>` : ''}
          </div>
          <div class="news-title">${escHtml(item.title)}</div>
          ${hasSummary ? `<div class="news-summary">${escHtml(item.summary)}</div>` : ''}
          <div class="news-read-more">阅读原文 →</div>
        </a>`;
    }

    // ── 状态页 ────────────────────────────────────────────────────────────────
    function showLoading() {
      document.getElementById('newsList').innerHTML = `
        <div class="state-box">
          <div class="spinner"></div>
          <div class="msg">正在加载今日简报...</div>
        </div>`;
    }

    function showEmpty(hint) {
      document.getElementById('newsList').innerHTML = `
        <div class="state-box">
          <div class="icon">📭</div>
          <div class="msg">${hint || '今日暂无资讯'}</div>
          <div class="sub">数据每日自动更新，请稍后再访问</div>
        </div>`;
    }

    function showError(msg) {
      document.getElementById('newsList').innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <div class="msg">加载失败</div>
          <div class="sub">${escHtml(msg)}</div>
        </div>`;
    }

    // ── 工具函数 ──────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00+08:00');
      const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日　${days[d.getDay()]}`;
    }

    // ── 初始化 ────────────────────────────────────────────────────────────────
    loadNews();
  </script>
</body>
</html>
